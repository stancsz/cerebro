syntax = "proto3";

package cerebro;

option go_package = "github.com/stancsz/cerebro/internal/proto";

service CognitiveEngine {
  // Amygdala Protocol
  rpc EvaluateRiskQuotient(RiskRequest) returns (RiskResponse);

  // Tensor State Math
  rpc PruneContextGraph(GraphRequest) returns (GraphResponse);

  // Matrix Embedding & Federation
  rpc EmbedHeuristic(EmbedRequest) returns (EmbedResponse);

  // Vision/Audio Multimodal Extraction
  rpc ExtractSemantics(MultimodalRequest) returns (MultimodalResponse);

  // Quantum Coprocessor Simulation
  // Evaluates billions of cascading failure topologies simultaneously in superposition.
  rpc QuantumSimulateScenario(QuantumRequest) returns (QuantumResponse);
}

message RiskRequest {
  string proposed_action = 1;
  float reversibility_index = 2;
  string current_objective = 3;
}

message RiskResponse {
  float risk_quotient = 1;
  bool allowed = 2;
}

message GraphRequest {
  string active_objective = 1;
  map<string, string> environment_state = 2;
}

message GraphResponse {
  map<string, string> pruned_environment = 1;
}

message EmbedRequest {
  string heuristic = 1;
  string validation_hash = 2;
  int32 saliency = 3;
}

message EmbedResponse {
  bool success = 1;
}

message MultimodalRequest {
  bytes payload = 1;
  string modality = 2; // "vision", "audio", "ast"
}

message MultimodalResponse {
  string semantic_text = 1;
}

enum SimulationType {
  SUPERPOSITION_ARBITRAGE = 0; // For market spread, parallel variable probabilities
  QUBO_ROUTING = 1;            // For supply chain and logistics mapping
  ENTANGLEMENT_CASCADE = 2;    // For strategic domino-effect modeling
}

message QuantumEdge {
  int32 source_node = 1;
  int32 target_node = 2;
  float entanglement_weight = 3;
}

message QuantumRequest {
  string scenario_context = 1;
  int32 variables_count = 2; // For qubit allocation size
  SimulationType sim_type = 3;
  repeated QuantumEdge dependency_map = 4; // Crucial for entanglement cascades
}

message QuantumResponse {
  float lowest_energy_probability = 1; // Used as the collapsed risk factor
  string optimized_path = 2;
  map<string, float> collapsed_state_matrix = 3; // The final state of all variables
}
